apiVersion: v1
kind: ConfigMap
metadata:
  name: blackbox-exporter-config
  namespace: monitoring
data:
  config.yml: |
    modules:
      # HTTP 2xx probe — use for plain HTTP endpoints
      http_2xx:
        prober: http
        timeout: 10s
        http:
          valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
          valid_status_codes: []        # Defaults to 2xx
          method: GET
          follow_redirects: true
          preferred_ip_protocol: ip4

      # HTTPS 2xx probe — use for HTTPS endpoints (also checks TLS)
      http_2xx_tls:
        prober: http
        timeout: 10s
        http:
          valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
          valid_status_codes: []
          method: GET
          follow_redirects: true
          tls_config:
            insecure_skip_verify: false  # Set true if using self-signed cert
          preferred_ip_protocol: ip4

      # TCP probe — use when HTTP is not available
      tcp_connect:
        prober: tcp
        timeout: 10s

      # ICMP ping probe
      icmp:
        prober: icmp
        timeout: 5s
        icmp:
          preferred_ip_protocol: ip4
